# 报告AI解读系统 - 普通服务器部署
# 使用方式: docker-compose up -d
# 访问: http://localhost:80
# 后端启动时自动执行 init_db，在 PostgreSQL 中创建所需表，无需手动建表

version: "3.8"

services:
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      # 默认使用 PostgreSQL；启动时自动建表
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/report_ai}
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://host.docker.internal:8000}
      - OCR_SERVICE_URL=${OCR_SERVICE_URL:-http://host.docker.internal:8866}
      - HOSPITAL_NAME=${HOSPITAL_NAME:-报告AI解读}
      - LIS_ADAPTER=${LIS_ADAPTER:-mock}
      - LIS_USE_ASMX=${LIS_USE_ASMX:-false}
      - LIS_API_BASE_URL=${LIS_API_BASE_URL:-}
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

  # 生产使用 PostgreSQL：启用此服务；后端将自动建表
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: report_ai
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  backend-data:
  backend-uploads:
  postgres-data:

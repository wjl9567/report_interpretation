# 敏感配置模板：复制为 secret.yaml，填写实际值后 kubectl apply -f k8s/secret.yaml
# 不要将 secret.yaml 提交到代码仓库
apiVersion: v1
kind: Secret
metadata:
  name: report-ai-secret
  namespace: report-ai
type: Opaque
stringData:
  # ---- 使用集群内 PostgreSQL（k8s/postgres.yaml）时必填 ----
  POSTGRES_USER: "report_ai"
  POSTGRES_PASSWORD: "请修改为强密码"
  # 后端连接串（与上面用户密码一致，主机填 report-ai-postgres）
  DATABASE_URL: "postgresql+asyncpg://report_ai:请修改为强密码@report-ai-postgres:5432/report_ai"
  # ---- 使用外部 PostgreSQL 时仅填 DATABASE_URL ----
  # DATABASE_URL: "postgresql+asyncpg://用户:密码@外部主机:5432/库名"
  # ---- 可选 ----
  # LIS_API_KEY: ""

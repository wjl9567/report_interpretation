# 后端非敏感配置，按需修改后 kubectl apply
# DATABASE_URL 由 Secret report-ai-secret 提供，不在此处配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: report-ai-config
  namespace: report-ai
data:
  HOST: "0.0.0.0"
  PORT: "8080"
  HOSPITAL_NAME: "报告AI解读"
  APP_NAME: "报告AI解读系统"
  # 推理服务（本次实施为 sglang 部署安诊儿，OpenAI 兼容接口）；OCR 改为院内实际地址或集群内 Service
  VLLM_BASE_URL: "http://vllm-service.default.svc.cluster.local:8000"
  OCR_SERVICE_URL: "http://ocr-service.default.svc.cluster.local:8866"
  # LIS：mock=演示数据，winning=卫宁 ASMX。检验 8092 + 检查 8091 均需时填两项
  LIS_ADAPTER: "mock"
  LIS_USE_ASMX: "false"
  LIS_API_BASE_URL: ""
  LIS_EXAM_ASMX_BASE_URL: ""
  HL7_ENABLED: "false"
  # 嵌入/患者接口：list_select=先展示报告列表选中再解读，latest_auto=自动解读最新一条
  EMBED_REPORT_MODE: "list_select"
  # 全站中文时区，API 日期序列化与展示
  TIMEZONE: "Asia/Shanghai"
  # 轻量知识增强：规范/指南目录，启用后按报告类型与科室注入 knowledge/ 下 .md 片段
  KNOWLEDGE_ENABLED: "false"
  KNOWLEDGE_DIR: "knowledge"
  KNOWLEDGE_MAX_CHARS: "4000"
  # SQL Server：病历号/门诊卡号→HID 解析（正式对接时启用）。密码放 Secret
  MSSQL_ENABLED: "false"
  MSSQL_SERVER: ""
  MSSQL_USER: ""
  MSSQL_DATABASE: ""
  MSSQL_VIEW_HID: "VW_BRJZXXK"
  MSSQL_COLUMN_PAT_NUM: "pat_num"
  MSSQL_COLUMN_XH: "xh"
  MSSQL_COLUMN_JLRQ: "jlrq"
  # 报告范围（天）：0=不按日期；7/14=近一周或两周门急诊/住院
  MSSQL_VIEW_REPORT_DAYS: "0"

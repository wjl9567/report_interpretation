apiVersion: apps/v1
kind: Deployment
metadata:
  name: report-ai-frontend
  namespace: report-ai
  labels:
    app: report-ai
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: report-ai
      component: frontend
  template:
    metadata:
      labels:
        app: report-ai
        component: frontend
    spec:
      containers:
        - name: frontend
          image: report-ai-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
